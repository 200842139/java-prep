<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="description" content="JavaPrep" />
  <title>JavaPrep</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="max-w-[480px] mx-auto min-h-screen min-w-0 overflow-x-hidden w-full">
    <!-- 顶部 -->
    <header class="sticky top-0 z-10 bg-white/95 dark:bg-slate-800/95 border-b border-gray-200 dark:border-slate-600 px-4 py-4 backdrop-blur flex items-center justify-between">
      <h1 class="text-xl font-bold flex items-center gap-2 text-gray-900 dark:text-slate-100">
        <span class="text-2xl">☕</span> JavaPrep
      </h1>
      <button type="button" id="theme-toggle" class="p-2 rounded-lg text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors" aria-label="切换深色模式" title="切换深色模式">
        <span id="theme-icon" class="text-xl">🌙</span>
      </button>
    </header>

    <!-- 底部 Tab -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] flex bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-600 p-2 z-20" style="padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0));">
      <button type="button" class="tab-btn active flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-gray-500 dark:text-slate-400 text-xs font-medium transition-colors hover:text-gray-800 dark:hover:text-slate-200" data-tab="read" aria-label="阅读">
        <span class="text-lg">📖</span>
        <span>阅读</span>
      </button>
      <button type="button" class="tab-btn flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-gray-500 dark:text-slate-400 text-xs font-medium transition-colors hover:text-gray-800 dark:hover:text-slate-200" data-tab="quiz" aria-label="模拟测试">
        <span class="text-lg">✍️</span>
        <span>模拟测试</span>
      </button>
    </nav>

    <main class="px-4 py-4 pb-6">
      <!-- 阅读 Tab -->
      <section id="tab-read" class="tab-pane active">
        <div class="mb-4">
          <h2 class="text-base font-semibold text-gray-900 dark:text-slate-100">知识目录</h2>
        </div>
        <div id="catalog-root" class="flex flex-col gap-3">
          <div class="text-center py-12">
            <div class="spinner mx-auto" role="status" aria-hidden="true"></div>
            <p class="mt-2 text-gray-500 dark:text-slate-400 text-sm">加载目录中...</p>
          </div>
        </div>
      </section>

      <!-- 模拟测试 Tab -->
      <section id="tab-quiz" class="tab-pane">
        <div id="quiz-start">
          <div class="mb-4">
            <h2 class="text-base font-semibold text-gray-900 dark:text-slate-100">模拟测试</h2>
            <p class="text-gray-500 dark:text-slate-400 text-sm mt-0.5">选择题形式，检验面试知识点掌握情况</p>
          </div>
          <p class="text-gray-500 dark:text-slate-400 text-sm mb-6">共 <strong id="total-questions" class="text-gray-800 dark:text-slate-200">0</strong> 题 · 建议 5–10 分钟完成</p>
          <button type="button" class="w-full py-3.5 px-4 rounded-2xl bg-blue-500 hover:bg-blue-600 text-white font-medium text-base transition-colors" id="btn-start-quiz">
            开始答题
          </button>
        </div>

        <div id="quiz-area" class="hidden">
          <div class="mb-4">
            <div class="flex justify-between text-gray-500 dark:text-slate-400 text-sm mb-1.5">
              <span>第 <span id="current-q">1</span> / <span id="total-q">0</span> 题</span>
              <span id="quiz-category" class="text-gray-400 dark:text-slate-500"></span>
            </div>
            <div class="h-1.5 bg-gray-200 dark:bg-slate-600 rounded-full overflow-hidden">
              <div class="h-full bg-blue-500 rounded-full transition-all duration-300" id="quiz-progress-bar" style="width: 0%"></div>
            </div>
          </div>
          <div class="rounded-xl border border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 overflow-hidden shadow-sm">
            <div class="p-4">
              <p class="quiz-question text-gray-900 dark:text-slate-100 leading-relaxed mb-4" id="quiz-question"></p>
              <div class="flex flex-col gap-2" id="quiz-options"></div>
            </div>
          </div>
          <div class="flex gap-3 mt-4">
            <button type="button" class="flex-1 py-2.5 rounded-xl border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-slate-400 hover:bg-gray-50 dark:hover:bg-slate-700 hover:text-gray-900 dark:hover:text-slate-200 disabled:opacity-50 disabled:cursor-not-allowed font-medium transition-colors" id="btn-prev" disabled>上一题</button>
            <button type="button" class="flex-1 py-2.5 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-medium transition-colors" id="btn-next">下一题</button>
            <button type="button" class="hidden flex-1 py-2.5 rounded-xl bg-green-500 hover:bg-green-600 text-white font-medium transition-colors" id="btn-submit">提交并查看结果</button>
          </div>
        </div>

        <div id="quiz-result" class="hidden">
          <div class="rounded-xl border border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 overflow-hidden text-center p-6 shadow-sm">
            <p class="text-3xl font-bold text-blue-500 m-0" id="result-score">0 / 0</p>
            <p class="text-gray-500 dark:text-slate-400 text-sm mt-2" id="result-desc"></p>
            <button type="button" class="mt-4 py-2.5 px-6 rounded-2xl bg-blue-500 hover:bg-blue-600 text-white font-medium" id="btn-restart">再测一次</button>
          </div>
          <div id="result-detail" class="mt-4 space-y-3"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- 图片放大层（支持双指缩放、单指拖动） -->
  <div id="image-viewer" class="fixed inset-0 z-40 flex items-center justify-center bg-black/80 p-4 hidden touch-none" aria-hidden="true">
    <div id="image-viewer-inner" class="relative flex items-center justify-center w-full h-full overflow-hidden">
      <img id="image-viewer-img" src="" alt="放大查看" class="max-w-full max-h-full object-contain select-none" style="transform-origin: center center;" />
    </div>
    <button type="button" id="image-viewer-close" class="absolute top-4 right-4 z-10 p-2 rounded-full bg-white/20 text-white text-sm" aria-label="关闭">关闭</button>
  </div>

  <!-- 回到顶部 -->
  <button type="button" id="back-to-top" class="fixed right-4 w-11 h-11 rounded-full bg-blue-500 hover:bg-blue-600 text-white shadow-lg flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 dark:focus:ring-offset-slate-900 z-[35]" style="bottom: calc(4rem + env(safe-area-inset-bottom, 0));" aria-label="回到顶部" title="回到顶部">
    <span class="text-xl leading-none" aria-hidden="true">↑</span>
  </button>

  <!-- 文章阅读层（本地资料） -->
  <div id="reader-overlay" class="fixed inset-0 z-30 bg-gray-50 dark:bg-slate-900 flex flex-col hidden min-w-0 overflow-x-hidden">
    <header class="flex-shrink-0 flex items-center gap-2 px-4 py-3 border-b border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 min-w-0">
      <button type="button" id="reader-back" class="p-2 -ml-2 rounded-lg text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700 flex-shrink-0" aria-label="返回">←</button>
      <h2 id="reader-title" class="flex-1 min-w-0 text-base font-semibold text-gray-900 dark:text-slate-100 truncate">文章</h2>
    </header>
    <div id="reader-content" class="flex-1 min-w-0 overflow-auto overflow-x-hidden px-4 py-4 article-content text-gray-800 dark:text-slate-200">
      加载中…
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
